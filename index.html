<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engagement Ceremony of Arbaj & Sana Kaussain</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #041f14; /* Royal Dark Emerald */
            --gold: #d4af37; /* Burnished Gold */
            --gold-light: #fbeba7;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-light);
            overflow-x: hidden;
            /* Premium Islamic Ornament Pattern Overlay Background */
            background-image: radial-gradient(circle at center, rgba(10,61,42,0.9) 0%, rgba(3,20,14,0.98) 100%), 
                              url('https://www.transparenttextures.com/patterns/arabesque.png');
        }

        /* ----- PREMIUM ISLAMIC GEOMETRIC DOORS ----- */
        #doors-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #03170e;
            background-image: linear-gradient(135deg, rgba(4,31,20,0.5) 0%, rgba(1,10,6,0.8) 100%), 
                              url('https://www.transparenttextures.com/patterns/arabesque.png'); /* Pattern on doors */
            border: 4px solid var(--gold);
            transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .door.left { 
            left: 0; 
            border-right: 2px solid var(--gold); 
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.8);
        }
        .door.right { 
            right: 0; 
            border-left: 2px solid var(--gold); 
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.8);
        }

        /* Premium Ornamental Gold Arch Overlay */
        .door::after {
            content: '';
            position: absolute;
            top: 8%; bottom: 8%;
            width: 80%;
            border: 2px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 15px rgba(212,175,55,0.1);
        }
        .door.left::after { right: 8%; border-radius: 120px 0 0 120px; border-right: none; }
        .door.right::after { left: 8%; border-radius: 0 120px 120px 0; border-left: none; }

        .door-open-left { transform: translateX(-100%); }
        .door-open-right { transform: translateX(100%); }

        /* Middle Pure Open Text Circle Button */
        .open-btn {
            position: relative;
            z-index: 101;
            width: 95px;
            height: 95px;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: #03170e;
            background: radial-gradient(circle, #fff 0%, #fbeba7 40%, #d4af37 85%, #946b07 100%);
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.9), inset 0 0 12px rgba(255,255,255,0.6);
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 1.5px;
        }

        .open-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 45px rgba(212, 175, 55, 1);
        }

        .open-btn.fade-out {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        /* ----- MAIN CONTENT TEMPLATE ----- */
        .main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 30px 15px 80px 15px;
        }

        section {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 100%;
            max-width: 650px;
            margin: 45px auto;
            text-align: center;
        }
        
        section.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ----- HERO CONTENT FRAME ----- */
        .islamic-border {
            border: 3px solid var(--gold);
            padding: 60px 30px;
            border-radius: 150px 150px 0 0;
            background: rgba(3, 23, 14, 0.85);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .islamic-border::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px dashed var(--gold);
            border-radius: 160px 160px 0 0;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--gold-light);
            letter-spacing: 3px;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: var(--gold);
            text-shadow: 0 3px 6px rgba(0,0,0,0.6);
            margin: 10px 0;
        }

        /* ----- TRUE REALTIME SCRATCH LAYER ----- */
        .instruction {
            font-size: 1.2rem;
            color: var(--gold-light);
            margin-bottom: 15px;
            font-family: 'Amiri', serif;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .scratch-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 230px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
            overflow: hidden;
            background: #051d14;
            border: 2px solid var(--gold);
        }

        .scratch-reveal-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1;
            background: radial-gradient(circle, #083321 0%, #03170e 100%);
        }

        .scratch-reveal-box h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .scratch-reveal-box p {
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
            margin: 4px 0;
            color: #ffffff;
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            cursor: url('https://img.icons8.com/ios-filled/32/d4af37/sparkling-diamond.png'), pointer;
            transition: opacity 0.8s ease;
        }

        /* ----- 5-SECOND FIREWORKS ANIMATIONS ----- */
        .fw-particle {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: fireworkSpread 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes fireworkSpread {
            0% { transform: translate(0,0) scale(1.5); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* ----- COUNTDOWN MATRIX ----- */
        .countdown-title {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 25px;
        }

        .timer-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-card {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 12px;
            min-width: 85px;
            backdrop-filter: blur(2px);
        }

        .time-card span {
            display: block;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .time-card label {
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a0bca0;
        }

        /* ----- MAP VIEW INTEGRATION ----- */
        .venue-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .venue-address {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .map-wrapper {
            border: 2px solid var(--gold);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 300px;
            display: block;
        }

        /* ----- FOOTER ----- */
        footer {
            margin-top: 60px;
            padding: 30px 10px;
            font-family: 'Great Vibes', cursive;
            font-size: 2.4rem;
            color: var(--gold);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            width: 80%;
            text-align: center;
        }

        @media (max-width: 480px) {
            h2 { font-size: 2.6rem; }
            .time-card { min-width: 70px; padding: 10px; }
            .time-card span { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div id="doors-container">
        <div class="door left" id="door-l"></div>
        <div class="door right" id="door-r"></div>
        <button class="open-btn" id="click-open-btn">OPEN</button>
    </div>

    <div class="main-content" id="wedding-card-content">
        
        <section class="scroll-section">
            <div class="islamic-border">
                <h1>The Engagement Ceremony of</h1>
                <h2>Arbaj</h2>
                <p style="font-family:'Great Vibes'; font-size:2.2rem; color:var(--gold-light);">and</p>
                <h2>Sana Kaussain</h2>
            </div>
        </section>

        <section class="scroll-section" style="position: relative;" id="scratch-section">
            <div class="instruction"><i class="fas fa-sparkles"></i> Scratch over the golden surface to reveal date</div>
            <div class="scratch-container" id="canvas-host">
                <div class="scratch-reveal-box">
                    <h3>You're Invited</h3>
                    <p><i class="far fa-calendar-check" style="color:var(--gold);"></i> June 13, 2026</p>
                    <p>Saturday</p>
                    <p><i class="far fa-clock" style="color:var(--gold);"></i> After Namaz-a-Asr at 5:30pm</p>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <section class="scroll-section">
            <h3 class="countdown-title">Counting Down</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="lbl-days">00</span><label>Days</label></div>
                <div class="time-card"><span id="lbl-hours">00</span><label>Hours</label></div>
                <div class="time-card"><span id="lbl-mins">00</span><label>Min</label></div>
                <div class="time-card"><span id="lbl-secs">00</span><label>Secs</label></div>
            </div>
        </section>

        <section class="scroll-section">
            <h3 class="venue-title"><i class="fas fa-map-marked-alt"></i> Venue</h3>
            <p class="venue-address">
                <strong>Hotel Yugvir & Garden</strong><br>
                Nira-Baramati Road, Nimbut
            </p>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3174.9610736330874!2d74.24886167424374!3d18.10959458160069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc3ab005580541d%3A0xec01f662fe63ba08!2sHotel%20Yugveer%20Garden!5e1!3m2!1sen!2sin!4v1780923617727!5m2!1sen!2sin" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <footer>
            Regards,<br>Hakim & Shaikh family
        </footer>
    </div>

    <script>
        // --- MOTOR CONTROL: SLIDING DOORS ---
        const btnOpen = document.getElementById('click-open-btn');
        const doorLeft = document.getElementById('door-l');
        const doorRight = document.getElementById('door-r');
        const panelContainer = document.getElementById('doors-container');
        const wrapperMain = document.getElementById('wedding-card-content');

        btnOpen.addEventListener('click', () => {
            btnOpen.classList.add('fade-out');
            doorLeft.classList.add('door-open-left');
            doorRight.classList.add('door-open-right');
            
            wrapperMain.style.display = 'flex';

            setTimeout(() => {
                panelContainer.style.display = 'none';
                manageScrollReveals();
            }, 2200);
        });

        // --- MOTOR CONTROL: VIEWPORT MONITORS ---
        const sections = document.querySelectorAll('.scroll-section');
        function manageScrollReveals() {
            sections.forEach(sec => {
                const secTop = sec.getBoundingClientRect().top;
                if (secTop < window.innerHeight * 0.85) {
                    sec.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', manageScrollReveals);

        // --- MOTOR CONTROL: INTERACTIVE CANVAS SCRATCH SYSTEM ---
        const cvs = document.getElementById('scratch-canvas');
        const renderCtx = cvs.getContext('2d');
        const hostBox = document.getElementById('canvas-host');
        let totalScratchedPixels = 0;
        let scratchTriggered = false;
        let isDrawing = false;

        function buildScratchInterface() {
            cvs.width = hostBox.offsetWidth;
            cvs.height = hostBox.offsetHeight;

            // Shimmer Golden Texture Core Layout
            let gd = renderCtx.createLinearGradient(0, 0, cvs.width, cvs.height);
            gd.addColorStop(0, '#946b07');
            gd.addColorStop(0.2, '#fbeba7');
            gd.addColorStop(0.5, '#d4af37');
            gd.addColorStop(0.8, '#fbeba7');
            gd.addColorStop(1, '#aa7c11');
            
            renderCtx.fillStyle = gd;
            renderCtx.fillRect(0, 0, cvs.width, cvs.height);

            // Vintage Islamic Frame Border lines on Golden Canvas Overlay
            renderCtx.strokeStyle = 'rgba(3, 23, 14, 0.4)';
            renderCtx.lineWidth = 4;
            renderCtx.strokeRect(12, 12, cvs.width - 24, cvs.height - 24);

            // Typographical Guidelines
            renderCtx.font = "bold 20px 'Amiri', serif";
            renderCtx.fillStyle = "#03170e";
            renderCtx.textAlign = "center";
            renderCtx.fillText("✨ Scratch Here to Open ✨", cvs.width / 2, cvs.height / 2 + 7);
        }

        window.addEventListener('resize', buildScratchInterface);
        // Direct init setup verification
        setTimeout(buildScratchInterface, 300);

        function handleScratchDraw(e) {
            if (scratchTriggered) return;
            
            const rect = cvs.getBoundingClientRect();
            // Unified coordinates mapping engine for Desktop & Mobile clients
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const currentX = clientX - rect.left;
            const currentY = clientY - rect.top;

            renderCtx.globalCompositeOperation = 'destination-out';
            renderCtx.beginPath();
            renderCtx.arc(currentX, currentY, 30, 0, Math.PI * 2);
            renderCtx.fill();

            totalScratchedPixels++;
            
            // Auto-complete validation metrics once user scratches a few strokes
            if (totalScratchedPixels > 25) {
                triggerAutomatedSequence();
            }
        }

        function triggerAutomatedSequence() {
            if (scratchTriggered) return;
            scratchTriggered = true;

            cvs.style.opacity = '0';
            
            // Run 5-Seconds Nonstop Fireworks Generator Engine Loop
            const fireworksLoopInterval = setInterval(() => {
                generateBurstNode();
            }, 400);

            // Terminate loops perfectly on 5000 milliseconds milestone
            setTimeout(() => {
                clearInterval(fireworksLoopInterval);
                cvs.remove();
            }, 5000);
        }

        // Tracking Desktop Mouse Clicks
        cvs.addEventListener('mousedown', (e) => { isDrawing = true; handleScratchDraw(e); });
        cvs.addEventListener('mousemove', (e) => { if(isDrawing) handleScratchDraw(e); });
        window.addEventListener('mouseup', () => isDrawing = false);

        // Tracking Mobile Device Touch inputs
        cvs.addEventListener('touchstart', (e) => { isDrawing = true; handleScratchDraw(e); });
        cvs.addEventListener('touchmove', (e) => { if(isDrawing) handleScratchDraw(e); });
        window.addEventListener('touchend', () => isDrawing = false);


        // --- ENGINE: PYROTECHNIC EXPLOSION DESIGNS (FIREWORKS) ---
        function generateBurstNode() {
            const vibrantColors = ['#d4af37', '#fbeba7', '#ffffff', '#ff3366', '#33ffcc', '#ff9933'];
            const clusterWeight = 45; 

            // Create explosion node anchors randomly distributed inside card wrapper viewport
            const rootX = 20 + Math.random() * (hostBox.offsetWidth - 40);
            const rootY = 20 + Math.random() * (hostBox.offsetHeight - 40);

            for (let k = 0; k < clusterWeight; k++) {
                const particle = document.createElement('div');
                particle.className = 'fw-particle';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 140;
                
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                particle.style.setProperty('--mx', `${moveX}px`);
                particle.style.setProperty('--my', `${moveY}px`);
                
                particle.style.left = `${rootX}px`;
                particle.style.top = `${rootY}px`;
                particle.style.backgroundColor = vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.backgroundColor}`;

                hostBox.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        // --- ENGINE: LIVE EVENT CHRONOMETER COUNTER ---
        const eventTimeline = new Date("June 13, 2026 17:30:00").getTime();

        setInterval(() => {
            const timeNow = new Date().getTime();
            const difference = eventTimeline - timeNow;

            if (difference < 0) return;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('lbl-days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('lbl-hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('lbl-mins').innerText = m < 10 ? '0' + m : m;
            document.getElementById('lbl-secs').innerText = s < 10 ? '0' + s : s;
        }, 1000);
    </script>
</body>
</html>
