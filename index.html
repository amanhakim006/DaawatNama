<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engagement Ceremony of Arbaj & Sana Kaussain</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #06261a; /* Rich Royal Emerald Green */
            --gold: #d4af37; /* Royal Metallic Gold */
            --gold-light: #f3e5ab;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-light);
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0a3d2a 0%, #03140e 100%);
        }

        /* ----- PREMIUM DOOR SYSTEM ----- */
        #doors-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #041a12;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            border: 3px solid var(--gold);
            transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .door.left { 
            left: 0; 
            border-right: 1.5px solid var(--gold); 
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.6);
        }
        .door.right { 
            right: 0; 
            border-left: 1.5px solid var(--gold); 
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.6);
        }

        /* Elegant Arch Outlines */
        .door::after {
            content: '';
            position: absolute;
            top: 5%; bottom: 5%;
            width: 85%;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        .door.left::after { right: 5%; border-radius: 100% 0 0 100% / 50% 0 0 50%; }
        .door.right::after { left: 5%; border-radius: 0 100% 100% 0 / 0 50% 50% 0; }

        /* Smooth Sliders */
        .door-open-left { transform: translateX(-100%); }
        .door-open-right { transform: translateX(100%); }

        /* Small Circle Middle Button */
        .open-btn {
            position: relative;
            z-index: 101;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #041a12;
            background: radial-gradient(circle, #fff 0%, #f3e5ab 30%, #d4af37 70%, #aa7c11 100%);
            border: 3px solid var(--gold-light);
            cursor: pointer;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8), inset 0 0 10px rgba(255,255,255,0.5);
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .open-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(212, 175, 55, 1);
        }

        .open-btn.fade-out {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        /* ----- MAIN CONTENT ----- */
        .main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px 10px 80px 10px;
        }

        section {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s ease;
            width: 100%;
            max-width: 650px;
            margin: 40px auto;
            text-align: center;
        }
        
        section.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ----- HERO SECTION ----- */
        .islamic-border {
            border: 2px solid var(--gold);
            padding: 50px 30px;
            border-radius: 50% 50% 0 0 / 25% 25% 0 0;
            background: rgba(4, 26, 18, 0.7);
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
        }
        
        .islamic-border::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 1px dashed var(--gold);
            border-radius: 50% 50% 0 0 / 25% 25% 0 0;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--gold-light);
            letter-spacing: 3px;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            margin: 15px 0;
        }

        /* ----- SCRATCH BOX SECTION ----- */
        .instruction {
            font-size: 1.1rem;
            color: var(--gold-light);
            margin-bottom: 15px;
            font-family: 'Amiri', serif;
            letter-spacing: 1px;
        }

        .scratch-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 220px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .scratch-reveal-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #051d14 0%, #0d4430 100%);
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1;
        }

        .scratch-reveal-box h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .scratch-reveal-box p {
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            margin: 4px 0;
            color: #ffffff;
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            cursor: pointer;
            border-radius: 15px;
            transition: opacity 0.5s ease-out;
        }

        /* ----- FIREWORKS ----- */
        .fw-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: fireworkPop 1.2s ease-out forwards;
        }

        @keyframes fireworkPop {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* ----- COUNTDOWN TIMER ----- */
        .countdown-title {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 25px;
        }

        .timer-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-card {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 12px;
            min-width: 85px;
            backdrop-filter: blur(2px);
        }

        .time-card span {
            display: block;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .time-card label {
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a0bca0;
        }

        /* ----- VENUE & MAP ----- */
        .venue-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .venue-address {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .map-wrapper {
            border: 2px solid var(--gold);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 300px;
            display: block;
        }

        /* ----- FOOTER ----- */
        footer {
            margin-top: 60px;
            padding: 30px 10px;
            font-family: 'Great Vibes', cursive;
            font-size: 2.4rem;
            color: var(--gold);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            width: 80%;
            text-align: center;
        }

        @media (max-width: 480px) {
            h2 { font-size: 2.6rem; }
            .time-card { min-width: 70px; padding: 10px; }
            .time-card span { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- Door Entry Screen -->
    <div id="doors-container">
        <div class="door left" id="door-l"></div>
        <div class="door right" id="door-r"></div>
        <button class="open-btn" id="click-open-btn">Open</button>
    </div>

    <!-- Main Dynamic Content -->
    <div class="main-content" id="wedding-card-content">
        
        <!-- Frame 1: Names Section -->
        <section class="scroll-section">
            <div class="islamic-border">
                <h1>The Engagement Ceremony of</h1>
                <h2>Arbaj</h2>
                <p style="font-family:'Great Vibes'; font-size:2rem; color:var(--gold-light);">and</p>
                <h2>Sana Kaussain</h2>
            </div>
        </section>

        <!-- Frame 2: Scratch Card -->
        <section class="scroll-section" style="position: relative;" id="scratch-section">
            <div class="instruction"><i class="fas fa-sparkles"></i> Tap / Scratch anywhere on the card to reveal</div>
            <div class="scratch-container" id="canvas-host">
                <div class="scratch-reveal-box">
                    <h3>You're Invited</h3>
                    <p><i class="far fa-calendar-check" style="color:var(--gold);"></i> June 13, 2026</p>
                    <p>Saturday</p>
                    <p><i class="far fa-clock" style="color:var(--gold);"></i> After Namaz-a-Asr at 5:30pm</p>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <!-- Frame 3: Clock Analytics -->
        <section class="scroll-section">
            <h3 class="countdown-title">Counting Down</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="lbl-days">00</span><label>Days</label></div>
                <div class="time-card"><span id="lbl-hours">00</span><label>Hours</label></div>
                <div class="time-card"><span id="lbl-mins">00</span><label>Min</label></div>
                <div class="time-card"><span id="lbl-secs">00</span><label>Secs</label></div>
            </div>
        </section>

        <!-- Frame 4: Venue Map Integration -->
        <section class="scroll-section">
            <h3 class="venue-title"><i class="fas fa-map-marked-alt"></i> Venue</h3>
            <p class="venue-address">
                <strong>Hotel Yugvir & Garden</strong><br>
                Nira-Baramati Road, Nimbut
            </p>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3174.9610736330874!2d74.24886167424374!3d18.10959458160069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc3ab005580541d%3A0xec01f662fe63ba08!2sHotel%20Yugveer%20Garden!5e1!3m2!1sen!2sin!4v1780923617727!5m2!1sen!2sin" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <footer>
            Regards,<br>Hakim & Shaikh family
        </footer>
    </div>

    <script>
        // --- HANDLER: SMOOTH DOOR REVEAL ---
        const btnOpen = document.getElementById('click-open-btn');
        const doorLeft = document.getElementById('door-l');
        const doorRight = document.getElementById('door-r');
        const panelContainer = document.getElementById('doors-container');
        const wrapperMain = document.getElementById('wedding-card-content');

        btnOpen.addEventListener('click', () => {
            btnOpen.classList.add('fade-out');
            doorLeft.classList.add('door-open-left');
            doorRight.classList.add('door-open-right');
            
            wrapperMain.style.display = 'flex';

            setTimeout(() => {
                panelContainer.style.display = 'none';
                manageScrollReveals();
            }, 1800);
        });

        // --- HANDLER: SCROLL SECTIONS ENGINE ---
        const sections = document.querySelectorAll('.scroll-section');
        
        function manageScrollReveals() {
            sections.forEach(sec => {
                const secTop = sec.getBoundingClientRect().top;
                if (secTop < window.innerHeight * 0.85) {
                    sec.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', manageScrollReveals);

        // --- HANDLER: GOLDEN METALLIC SHIMMER SURFACE ---
        const cvs = document.getElementById('scratch-canvas');
        const renderCtx = cvs.getContext('2d');
        const hostBox = document.getElementById('canvas-host');
        let scratchTriggered = false;

        function setupScratchCanvas() {
            cvs.width = hostBox.offsetWidth;
            cvs.height = hostBox.offsetHeight;

            let gd = renderCtx.createLinearGradient(0, 0, cvs.width, cvs.height);
            gd.addColorStop(0, '#aa7c11');
            gd.addColorStop(0.3, '#f3e5ab');
            gd.addColorStop(0.5, '#d4af37');
            gd.addColorStop(0.8, '#f3e5ab');
            gd.addColorStop(1, '#aa7c11');
            
            renderCtx.fillStyle = gd;
            renderCtx.fillRect(0, 0, cvs.width, cvs.height);

            renderCtx.strokeStyle = 'rgba(4, 26, 18, 0.3)';
            renderCtx.lineWidth = 4;
            renderCtx.strokeRect(10, 10, cvs.width - 20, cvs.height - 20);

            renderCtx.font = "bold 22px 'Amiri', serif";
            renderCtx.fillStyle = "#06261a";
            renderCtx.textAlign = "center";
            renderCtx.fillText("✨ Scratch Here ✨", cvs.width / 2, cvs.height / 2 + 7);
        }

        window.addEventListener('load', () => {
            setTimeout(setupScratchCanvas, 200);
        });

        function executeInstantReveal() {
            if (scratchTriggered) return;
            scratchTriggered = true;

            cvs.style.opacity = '0';
            generateFireworksMatrix();

            setTimeout(() => {
                cvs.style.display = 'none';
            }, 500);
        }

        cvs.addEventListener('mousedown', executeInstantReveal);
        cvs.addEventListener('touchstart', (e) => {
            e.preventDefault();
            executeInstantReveal();
        });

        // --- HANDLER: FIREWORKS POPPING ---
        function generateFireworksMatrix() {
            const vibrantColors = ['#d4af37', '#f3e5ab', '#ffffff', '#ff5e62', '#ff9966', '#00ffcc'];
            const burstCount = 65; 

            for (let k = 0; k < burstCount; k++) {
                const particle = document.createElement('div');
                particle.className = 'fw-particle';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 90 + Math.random() * 180;
                
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                particle.style.setProperty('--mx', `${moveX}px`);
                particle.style.setProperty('--my', `${moveY}px`);
                
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.backgroundColor = vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                particle.style.boxShadow = `0 0 8px ${particle.style.backgroundColor}`;

                hostBox.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        // --- HANDLER: countdown ENGINE ---
        const eventTimeline = new Date("June 13, 2026 17:30:00").getTime();

        setInterval(() => {
            const timeNow = new Date().getTime();
            const difference = eventTimeline - timeNow;

            if (difference < 0) return;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('lbl-days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('lbl-hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('lbl-mins').innerText = m < 10 ? '0' + m : m;
            document.getElementById('lbl-secs').innerText = s < 10 ? '0' + s : s;
        }, 1000);
    </script>
</body>
</html>
