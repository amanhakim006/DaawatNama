<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Union: Arbaj & Sana Kaussain</title>
    <!-- Premium Editorial Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Sacramento&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --liquid-gold: #e2c07d;
            --deep-obsidian: #0a0e0d;
            --marble-vein: rgba(226, 192, 125, 0.15);
            --text-primary: #f4f1ea;
            --accent-glow: rgba(226, 192, 125, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-obsidian);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 30, 25, 1) 0%, var(--deep-obsidian) 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--text-primary);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ----- CINEMATIC GATEWAY ----- */
        #doors-container {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            transition: visibility 0s 2s;
        }

        .door {
            flex: 1;
            background: #0d1311;
            position: relative;
            display: flex;
            align-items: center;
            transition: transform 1.8s cubic-bezier(0.85, 0, 0.15, 1);
            border: 1px solid var(--marble-vein);
            overflow: hidden;
        }

        .door.left { justify-content: flex-end; border-right: 1px solid var(--liquid-gold); }
        .door.right { justify-content: flex-start; border-left: 1px solid var(--liquid-gold); }

        /* Elegant Patterning on Doors */
        .door::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/luxury-linen.png');
            opacity: 0.3;
        }

        .open-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            background: none;
            border: 1px solid var(--liquid-gold);
            padding: 40px;
            border-radius: 50%;
            color: var(--liquid-gold);
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.8s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .open-btn:hover {
            letter-spacing: 12px;
            box-shadow: 0 0 60px var(--liquid-gold);
            background: var(--liquid-gold);
            color: var(--deep-obsidian);
        }

        .door-open-left { transform: translateX(-105%); }
        .door-open-right { transform: translateX(105%); }

        /* ----- CONTENT WRAPPER ----- */
        .main-content {
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            transition: opacity 2s ease;
        }

        section {
            max-width: 800px;
            width: 100%;
            margin-bottom: 120px;
            text-align: center;
            transform: translateY(30px);
            opacity: 0;
            transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible {
            transform: translateY(0);
            opacity: 1;
        }

        /* ----- HERO SECTION ----- */
        .hero-title {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: var(--liquid-gold);
            font-weight: 300;
        }

        .couple-names {
            font-family: 'Sacramento', cursive;
            font-size: 5.5rem;
            line-height: 1;
            background: linear-gradient(to bottom, #fdf5e6, var(--liquid-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .ampersand {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2rem;
            display: block;
            margin: 10px 0;
            color: var(--text-primary);
            opacity: 0.6;
        }

        /* ----- SCRATCH CARD EVOLVED ----- */
        .scratch-container {
            position: relative;
            width: 320px;
            height: 450px;
            margin: 0 auto;
            border: 1px solid var(--liquid-gold);
            padding: 10px;
            background: rgba(255,255,255,0.02);
        }

        .reveal-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--marble-vein);
            background: #0d1110;
        }

        .reveal-content h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            letter-spacing: 10px;
            margin-bottom: 30px;
        }

        #scratch-canvas {
            position: absolute;
            top: 10px;
            left: 10px;
            cursor: crosshair;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* ----- COUNTDOWN BOXES ----- */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .timer-item {
            position: relative;
        }

        .timer-val {
            font-size: 3rem;
            font-weight: 300;
            display: block;
            color: var(--liquid-gold);
        }

        .timer-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* ----- MAP INTERFACE ----- */
        .map-container {
            filter: grayscale(1) invert(0.9) contrast(1.2);
            border: 1px solid var(--liquid-gold);
            height: 350px;
            width: 100%;
            margin-top: 30px;
            transition: filter 0.5s ease;
        }

        .map-container:hover {
            filter: grayscale(0.5) invert(0) contrast(1);
        }

        /* ----- PARTICLES ----- */
        .sparkle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--liquid-gold);
            border-radius: 50%;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .couple-names { font-size: 4rem; }
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            .scratch-container { width: 280px; height: 400px; }
        }
    </style>
</head>
<body>

    <div id="doors-container">
        <button class="open-btn" id="open-trigger">REVEAL</button>
        <div class="door left" id="door-l"></div>
        <div class="door right" id="door-r"></div>
    </div>

    <main class="main-content" id="main-ui">
        <!-- Section 1: Hero -->
        <section class="reveal-section">
            <h1 class="hero-title">The Engagement Ceremony of</h1>
            <div class="couple-names">Arbaj</div>
            <span class="ampersand">and</span>
            <div class="couple-names">Sana Kaussain</div>
        </section>

        <!-- Section 2: The Secret -->
        <section class="reveal-section">
            <p style="letter-spacing: 4px; margin-bottom: 20px; font-size: 0.9rem;">UNVEIL THE MOMENT</p>
            <div class="scratch-container" id="scratch-host">
                <div class="reveal-content">
                    <h3>JUNE 13</h3>
                    <p style="letter-spacing: 5px;">2026</p>
                    <div style="width: 30px; hieght: 1px; background: var(--liquid-gold); margin: 20px 0;"></div>
                    <p style="font-style: italic;">Saturday</p>
                    <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.7;">5:30 PM (Post Asr)</p>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <!-- Section 3: Countdown -->
        <section class="reveal-section">
            <h2 style="font-weight: 300; font-size: 2rem; margin-bottom: 20px;">The Prelude</h2>
            <div class="timer-grid">
                <div class="timer-item"><span class="timer-val" id="d">00</span><span class="timer-label">Days</span></div>
                <div class="timer-item"><span class="timer-val" id="h">00</span><span class="timer-label">Hours</span></div>
                <div class="timer-item"><span class="timer-val" id="m">00</span><span class="timer-label">Mins</span></div>
                <div class="timer-item"><span class="timer-val" id="s">00</span><span class="timer-label">Secs</span></div>
            </div>
        </section>

        <!-- Section 4: Location -->
        <section class="reveal-section">
            <h2 style="letter-spacing: 5px; font-size: 1rem; margin-bottom: 10px;">THE DESTINATION</h2>
            <p style="font-size: 1.8rem; color: var(--liquid-gold);">Hotel Yugvir & Garden</p>
            <p style="opacity: 0.6; font-style: italic;">Nira-Baramati Road, Nimbut</p>
            
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3174.9610736330874!2d74.24886167424374!3d18.10959458160069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc3ab005580541d%3A0xec01f662fe63ba08!2sHotel%20Yugveer%20Garden!5e1!3m2!1sen!2sin!4v1780923617727!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <footer style="margin-top: 50px; opacity: 0.4; letter-spacing: 3px; font-size: 0.8rem;">
            HAKIM & SHAIKH FAMILY
        </footer>
    </main>

    <script>
        const openBtn = document.getElementById('open-trigger');
        const mainUI = document.getElementById('main-ui');
        
        // --- Gate Logic ---
        openBtn.addEventListener('click', () => {
            document.getElementById('door-l').classList.add('door-open-left');
            document.getElementById('door-r').classList.add('door-open-right');
            openBtn.style.opacity = '0';
            mainUI.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('doors-container').style.pointerEvents = 'none';
                initScrollReveal();
            }, 1000);
        });

        // --- Intersection Observer for Staggered Reveal ---
        function initScrollReveal() {
            const sections = document.querySelectorAll('.reveal-section');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.2 });
            
            sections.forEach(s => observer.observe(s));
        }

        // --- Enhanced Scratch Logic ---
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const host = document.getElementById('scratch-host');

        function setupCanvas() {
            canvas.width = host.offsetWidth - 20;
            canvas.height = host.offsetHeight - 20;
            
            // Texture for the scratch layer
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#e2c07d';
            ctx.lineWidth = 1;
            ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
            
            ctx.font = "300 14px Montserrat";
            ctx.fillStyle = "#e2c07d";
            ctx.textAlign = "center";
            ctx.fillText("SCRATCH WITH LOVE", canvas.width/2, canvas.height/2);
        }

        let painting = false;
        function scratch(e) {
            if(!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Auto-clear threshold
            checkReveal();
        }

        let cleared = false;
        function checkReveal() {
            if(cleared) return;
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            let opacity = 0;
            for(let i=3; i<data.length; i+=4) if(data[i] === 0) opacity++;
            
            if(opacity > (data.length/4) * 0.5) {
                canvas.style.opacity = '0';
                cleared = true;
                createBurst();
            }
        }

        function createBurst() {
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = '50%';
                s.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 200;
                s.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
                ], { duration: 1000 + Math.random()*1000, easing: 'cubic-bezier(0,1,1,1)' });
                host.appendChild(s);
            }
        }

        canvas.addEventListener('mousedown', () => painting = true);
        window.addEventListener('mouseup', () => painting = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchstart', () => painting = true);
        canvas.addEventListener('touchmove', scratch);
        
        setupCanvas();

        // --- Countdown Engine ---
        const target = new Date("June 13, 2026 17:30:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;
            
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

    </script>
</body>
</html>
