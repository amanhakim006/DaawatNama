<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbaj & Sana | The Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;500&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --royal-emerald: #042f1e;
            --deep-forest: #011a10;
            --liquid-gold: linear-gradient(75deg, #a67c00 0%, #ffbf00 45%, #ffffff 50%, #ffbf00 55%, #a67c00 100%);
            --static-gold: #d4af37;
            --soft-cream: #fdfaf1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-forest);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(4, 47, 30, 0.7) 0%, rgba(1, 26, 16, 1) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3 Visual Noise %3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            color: var(--soft-cream);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- THE CEREMONIAL ENTRANCE --- */
        #gate-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .gate-wing {
            flex: 1;
            background: var(--royal-emerald);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .gate-wing::before {
            content: '';
            position: absolute;
            inset: 20px;
            border: 2px solid var(--static-gold);
            opacity: 0.2;
        }

        .center-seal {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: var(--deep-forest);
            border: 4px solid var(--static-gold);
            border-radius: 50%;
            z-index: 1001;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: 0.5s;
        }

        .center-seal:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 30px var(--static-gold); }
        .center-seal i { font-size: 2rem; color: var(--static-gold); margin-bottom: 5px; }
        .center-seal span { font-size: 0.7rem; letter-spacing: 3px; color: var(--static-gold); font-weight: bold; }

        /* --- CONTENT STYLING --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
            display: none;
            flex-direction: column;
            gap: 80px;
            opacity: 0;
            transition: 2s ease-out;
        }

        .hero-section {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            position: relative;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid var(--static-gold);
            pointer-events: none;
            clip-path: polygon(0 0, 15% 0, 15% 5%, 5% 5%, 5% 15%, 0 15%, 0 0, 85% 0, 85% 5%, 95% 5%, 95% 15%, 100% 15%, 100% 0, 100% 100%, 85% 100%, 85% 95%, 95% 95%, 95% 85%, 100% 85%, 100% 100%, 0 100%, 0 85%, 5% 85%, 5% 95%, 15% 95%, 15% 100%, 0 100%);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--static-gold);
            margin-bottom: 40px;
        }

        .names {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3.5rem, 10vw, 5.5rem);
            background: var(--liquid-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        /* --- THE SCRATCH CARD RE-IMAGINED --- */
        .scratch-container {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #05140f;
        }

        .invitation-details {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        .invitation-details p {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 10px 0;
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            touch-action: none;
            cursor: url('https://cdn-icons-png.flaticon.com/32/1041/1041916.png'), auto;
        }

        /* --- COUNTDOWN PANEL --- */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .count-box {
            background: linear-gradient(145deg, #05261a, #010d08);
            padding: 30px 10px;
            border-radius: 4px;
            border-bottom: 3px solid var(--static-gold);
            text-align: center;
        }

        .count-box span {
            display: block;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--static-gold);
        }

        .count-box label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* --- MAP & FOOTER --- */
        .venue-card {
            border-left: 1px solid var(--static-gold);
            padding-left: 30px;
            margin-bottom: 40px;
        }

        iframe {
            filter: grayscale(1) invert(0.9) contrast(1.2);
            border-radius: 4px;
            width: 100%;
            height: 350px;
            border: 0;
        }

        footer {
            text-align: center;
            padding: 60px 0;
            font-family: 'Pinyon Script', cursive;
            font-size: 2.5rem;
            color: var(--static-gold);
            opacity: 0.6;
        }

        /* --- ANIMATIONS --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.2s; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @media (max-width: 600px) {
            .countdown-grid { grid-template-columns: repeat(2, 1fr); }
            .names { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="gate-overlay">
        <div class="gate-wing" id="left-gate"></div>
        <div class="center-seal" id="open-btn">
            <i class="fa-solid fa-envelope-open-text"></i>
            <span>REVEAL</span>
        </div>
        <div class="gate-wing" id="right-gate"></div>
    </div>

    <div class="container" id="main-ui">
        <header class="hero-section reveal">
            <h1>The Engagement Ceremony</h1>
            <div class="names">Arbaj</div>
            <p style="font-size: 1.2rem; letter-spacing: 4px; opacity: 0.8;">&</p>
            <div class="names">Sana Kaussain</div>
        </header>

        <section class="reveal">
            <h2 style="text-align: center; margin-bottom: 20px; font-weight: 300; letter-spacing: 3px;">SAVE THE DATE</h2>
            <div class="scratch-container" id="scratch-box">
                <div class="invitation-details">
                    <p>Saturday, June 13, 2026</p>
                    <p style="font-size: 1.1rem; opacity: 0.7; font-family: 'Montserrat';">After Namaz-a-Asr • 5:30 PM</p>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <section class="reveal">
            <div class="countdown-grid">
                <div class="count-box"><span id="days">00</span><label>Days</label></div>
                <div class="count-box"><span id="hours">00</span><label>Hours</label></div>
                <div class="count-box"><span id="mins">00</span><label>Minutes</label></div>
                <div class="count-box"><span id="secs">00</span><label>Seconds</label></div>
            </div>
        </section>

        <section class="reveal">
            <div class="venue-card">
                <h3 style="color: var(--static-gold); letter-spacing: 2px; margin-bottom: 10px;">THE VENUE</h3>
                <p style="font-size: 1.4rem; font-family: 'Playfair Display';">Hotel Yugvir & Garden</p>
                <p style="opacity: 0.7;">Nira-Baramati Road, Nimbut</p>
            </div>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3174.9610736330874!2d74.24886167424374!3d18.10959458160069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc3ab005580541d%3A0xec01f662fe63ba08!2sHotel%20Yugveer%20Garden!5e1!3m2!1sen!2sin!4v1780923617727!5m2!1sen!2sin"></iframe>
        </section>

        <footer>
            Hakim & Shaikh Family
        </footer>
    </div>

    <script>
        // Opening Logic
        const openBtn = document.getElementById('open-btn');
        const mainUI = document.getElementById('main-ui');
        
        openBtn.addEventListener('click', () => {
            document.getElementById('left-gate').style.transform = 'translateX(-100%)';
            document.getElementById('right-gate').style.transform = 'translateX(100%)';
            openBtn.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate-overlay').style.display = 'none';
                mainUI.style.display = 'flex';
                setTimeout(() => { 
                    mainUI.style.opacity = '1';
                    handleReveal();
                    initScratch();
                }, 100);
            }, 1000);
        });

        // Scroll Reveal
        function handleReveal() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) el.classList.add('active');
            });
        }
        window.addEventListener('scroll', handleReveal);

        // Scratch Card Logic
        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const box = document.getElementById('scratch-box');
            
            canvas.width = box.offsetWidth;
            canvas.height = box.offsetHeight;

            // Paint elegant gold cover
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#a67c00');
            grad.addColorStop(0.5, '#d4af37');
            grad.addColorStop(1, '#8a6d1c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add texture to scratch layer
            ctx.globalAlpha = 0.1;
            for(let i=0; i<500; i++) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
            ctx.globalAlpha = 1.0;
            ctx.font = "bold 14px Montserrat";
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.textAlign = "center";
            ctx.fillText("RUB TO REVEAL DATE", canvas.width/2, canvas.height/2 + 50);

            let isDrawing = false;
            const scratch = (e) => {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.pageX || e.touches[0].pageX) - rect.left - window.scrollX;
                const y = (e.pageY || e.touches[0].pageY) - rect.top - window.scrollY;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 35, 0, Math.PI * 2);
                ctx.fill();
                
                checkScratch();
            };

            const checkScratch = () => {
                const data = ctx.getImageData(0,0,canvas.width, canvas.height).data;
                let count = 0;
                for(let i=0; i<data.length; i+=4) { if(data[i+3] === 0) count++; }
                if(count > (data.length/4) * 0.6) canvas.style.opacity = '0';
            };

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', () => isDrawing = true);
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', scratch);
        }

        // Countdown Timer
        const target = new Date("June 13, 2026 17:30:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
