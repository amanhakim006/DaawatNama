<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engagement Ceremony of Arbaj & Sana Kaussain</title>
    <!-- Ultra Premium Handpicked Fonts & Decorative Calligraphy Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Cinzel:wght@600;800&family=Monsieur+La+Doulaise&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-base: #cfa83d;
            --gold-linear: linear-gradient(135deg, #a17610 0%, #fef1b7 25%, #d4af37 50%, #fef1b7 75%, #886205 100%);
            --dark-emerald: #021a11;
            --emerald-light: #053321;
            --gold-text: #f3e5ab;
            --white: #ffffff;
            --purple-scratch: linear-gradient(135deg, #2d0b4e 0%, #4a157d 40%, #631e9a 70%, #1e0536 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Cinzel', serif;
            background-color: var(--gold-base);
            /* Premium High-End Damask Arabesque Wallpaper Texture Pattern Overlaid Background */
            background-image: radial-gradient(circle at center, rgba(251, 235, 167, 0.45) 0%, rgba(161, 118, 16, 0.9) 100%), 
                              url('https://www.transparenttextures.com/patterns/royal-feather.png');
            color: var(--dark-emerald);
            overflow-x: hidden;
        }

        /* ----- LUXURY DAMASK DOOR ARCHES ----- */
        #doors-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #886205;
            background-image: linear-gradient(135deg, rgba(136, 98, 5, 0.35) 0%, rgba(33, 24, 2, 0.95) 100%), 
                              url('https://www.transparenttextures.com/patterns/royal-feather.png');
            border: 5px solid var(--dark-emerald);
            transition: transform 2.5s cubic-bezier(0.76, 0, 0.165, 1);
        }

        .door.left { 
            left: 0; 
            border-right: 2.5px solid var(--dark-emerald); 
            box-shadow: inset -25px 0 50px rgba(0,0,0,0.85);
        }
        .door.right { 
            right: 0; 
            border-left: 2.5px solid var(--dark-emerald); 
            box-shadow: inset 20px 0 50px rgba(0,0,0,0.85);
        }

        .door::after {
            content: '';
            position: absolute;
            top: 7%; bottom: 7%;
            width: 84%;
            border: 3px double var(--dark-emerald);
        }
        .door.left::after { right: 7%; border-radius: 250px 0 0 250px; }
        .door.right::after { left: 7%; border-radius: 0 250px 250px 0; }

        .door-open-left { transform: translateX(-100%); }
        .door-open-right { transform: translateX(100%); }

        /* Pure Dynamic Open Middle Trigger Button */
        .open-btn {
            position: relative;
            z-index: 101;
            width: 105px;
            height: 105px;
            border-radius: 50%;
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--gold-text);
            background: radial-gradient(circle, #063c27 0%, #01140d 100%);
            border: 3.5px solid var(--gold-base);
            cursor: pointer;
            box-shadow: 0 0 35px rgba(2, 26, 17, 0.85), inset 0 0 15px rgba(212, 175, 55, 0.45);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 2px;
        }

        .open-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 50px rgba(2, 26, 17, 1);
            color: var(--white);
        }

        .open-btn.fade-out {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        /* ----- MAIN SCROLL LAYOUTS ----- */
        .main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 15px 100px 15px;
        }

        section {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1.4s cubic-bezier(0.215, 0.610, 0.355, 1);
            width: 100%;
            max-width: 660px;
            margin: 50px auto;
            text-align: center;
        }
        
        section.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ----- ISLAMIC ROYAL TEXTURED CREST ----- */
        .islamic-box-frame {
            border: 4px solid var(--dark-emerald);
            padding: 65px 35px;
            border-radius: 220px 220px 40px 40px;
            background: var(--dark-emerald);
            background-image: radial-gradient(circle at center, var(--emerald-light) 0%, var(--dark-emerald) 100%),
                              url('https://www.transparenttextures.com/patterns/royal-feather.png'); /* Pattern Inside Card */
            box-shadow: 0 30px 65px rgba(40, 30, 2, 0.45);
            position: relative;
        }
        
        .islamic-box-frame::before {
            content: '';
            position: absolute;
            top: 7px; left: 7px; right: 7px; bottom: 7px;
            border: 1px dashed var(--gold-base);
            border-radius: 213px 213px 33px 33px;
            pointer-events: none;
        }

        .islamic-box-frame h1 {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            margin-bottom: 30px;
            color: var(--gold-text);
            letter-spacing: 3px;
        }

        /* High-End Masterpiece Calligraphy Styling */
        .calligraphy-name {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: 6.5rem;
            font-weight: 400;
            background: var(--gold-linear);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.6));
            line-height: 1.1;
            display: block;
            margin: 10px 0;
        }

        /* ----- PURPLE LUXURY SCRATCH SHIELD ----- */
        .instruction {
            font-size: 1.15rem;
            color: var(--dark-emerald);
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .scratch-outer-shield {
            position: relative;
            width: 100%;
            max-width: 440px;
            height: 250px;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 4px solid var(--dark-emerald);
        }

        .invitation-reveal-vault {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            z-index: 1;
            background: linear-gradient(135deg, #032116 0%, #010a07 100%),
                        url('https://www.transparenttextures.com/patterns/royal-feather.png');
        }

        .invitation-reveal-vault h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            color: var(--gold-base);
            margin-bottom: 20px; /* Shifted downward for perfect clearance */
            letter-spacing: 1px;
        }

        /* Clean Single-Line Typography Rows */
        .single-line-date {
            font-family: 'Amiri', serif;
            font-size: 1.45rem;
            color: var(--white);
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
            padding-bottom: 8px;
            width: 90%;
        }

        .single-line-time {
            font-family: 'Amiri', serif;
            font-size: 1.35rem;
            color: var(--gold-text);
            letter-spacing: 0.5px;
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            cursor: pointer;
            /* Prevents canvas fading instantly, respects physical scratching threshold */
            transition: opacity 0.7s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        /* ----- PYROTECHNIC FIREWORKS ENGINE (5 SECONDS) ----- */
        .fw-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: fireworkFly 1.4s cubic-bezier(0.05, 0.75, 0.1, 1) forwards;
        }

        @keyframes fireworkFly {
            0% { transform: translate(0,0) scale(2); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* ----- COUNTER MODULES ----- */
        .countdown-title {
            font-family: 'Amiri', serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--dark-emerald);
            margin-bottom: 25px;
        }

        .timer-flex-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-box-shield {
            background: var(--dark-emerald);
            background-image: radial-gradient(circle at top, var(--emerald-light) 0%, var(--dark-emerald) 100%);
            border: 2px solid var(--gold-base);
            padding: 20px 10px;
            border-radius: 16px;
            min-width: 95px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .time-box-shield span {
            display: block;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold-base);
        }

        .time-box-shield label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            display: block;
            margin-top: 6px;
        }

        /* ----- GEOGRAPHIC EMBED LAYER ----- */
        .venue-title {
            font-family: 'Amiri', serif;
            font-size: 2.3rem;
            font-weight: bold;
            color: var(--dark-emerald);
            margin-bottom: 15px;
        }

        .venue-address-box {
            font-size: 1.25rem;
            line-height: 1.7;
            margin-bottom: 35px;
            color: var(--dark-emerald);
            font-weight: 600;
        }

        .map-frame-wrapper {
            border: 4px solid var(--dark-emerald);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(40,30,2,0.4);
        }

        .map-frame-wrapper iframe {
            width: 100%;
            height: 340px;
            display: block;
        }

        /* ----- SIGNATURE FOOTER ----- */
        footer {
            margin-top: 90px;
            padding: 35px 10px;
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: var(--dark-emerald);
            border-top: 3px double var(--dark-emerald);
            width: 85%;
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .calligraphy-name { font-size: 4.8rem; }
            .scratch-outer-shield { height: 260px; }
            .invitation-reveal-vault h3 { font-size: 1.8rem; }
            .single-line-date { font-size: 1.2rem; }
            .single-line-time { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <!-- Double Slide Decorative Entry Doors -->
    <div id="doors-container">
        <div class="door left" id="door-l"></div>
        <div class="door right" id="door-r"></div>
        <button class="open-btn" id="click-open-btn">OPEN</button>
    </div>

    <!-- Interface Structure Content -->
    <div class="main-content" id="wedding-card-content">
        
        <!-- Frame Section 1: Dynamic Calligraphy Framing -->
        <section class="scroll-section">
            <div class="islamic-box-frame">
                <h1>The Engagement Ceremony of</h1>
                <span class="calligraphy-name">Arbaj</span>
                <p style="font-family:'Great Vibes'; font-size:2.6rem; color:var(--gold-text); margin: 5px 0;">and</p>
                <span class="calligraphy-name">Sana Kaussain</span>
            </div>
        </section>

        <!-- Frame Section 2: Premium Purple Scratch Grid -->
        <section class="scroll-section" style="position: relative;">
            <div class="instruction"><i class="fas fa-hand-sparkles"></i> Rub on card to unveil invitation</div>
            <div class="scratch-outer-shield" id="canvas-host">
                <div class="invitation-reveal-vault">
                    <h3>You're Invited</h3>
                    <div class="single-line-date">
                        <i class="far fa-calendar-alt" style="color:var(--gold-base); margin-right: 6px;"></i> June 13, 2026, Saturday
                    </div>
                    <div class="single-line-time">
                        <i class="far fa-clock" style="color:var(--gold-base); margin-right: 6px;"></i> After Namaz-a-Asr at 5:30pm
                    </div>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <!-- Frame Section 3: Live Chronometer Ticker -->
        <section class="scroll-section">
            <h3 class="countdown-title">Counting Down</h3>
            <div class="timer-flex-row">
                <div class="time-box-shield"><span id="lbl-days">00</span><label>Days</label></div>
                <div class="time-box-shield"><span id="lbl-hours">00</span><label>Hours</label></div>
                <div class="time-box-shield"><span id="lbl-mins">00</span><label>Min</label></div>
                <div class="time-box-shield"><span id="lbl-secs">00</span><label>Secs</label></div>
            </div>
        </section>

        <!-- Frame Section 4: Location Matrix -->
        <section class="scroll-section">
            <h3 class="venue-title"><i class="fas fa-map-marker-alt"></i> Venue</h3>
            <div class="venue-address-box">
                <strong style="font-size: 1.45rem; color: var(--emerald-light);">Hotel Yugvir & Garden</strong><br>
                Nira-Baramati Road, Nimbut
            </div>
            <div class="map-frame-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3174.9610736330874!2d74.24886167424374!3d18.10959458160069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc3ab005580541d%3A0xec01f662fe63ba08!2sHotel%20Yugveer%20Garden!5e1!3m2!1sen!2sin!4v1780923617727!5m2!1sen!2sin" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <footer>
            Regards,<br>Hakim & Shaikh family
        </footer>
    </div>

    <script>
        // --- LOGIC DRIVE: DOOR EXECUTION ---
        const btnOpen = document.getElementById('click-open-btn');
        const doorLeft = document.getElementById('door-l');
        const doorRight = document.getElementById('door-r');
        const panelContainer = document.getElementById('doors-container');
        const wrapperMain = document.getElementById('wedding-card-content');

        btnOpen.addEventListener('click', () => {
            btnOpen.classList.add('fade-out');
            doorLeft.classList.add('door-open-left');
            doorRight.classList.add('door-open-right');
            
            wrapperMain.style.display = 'flex';

            setTimeout(() => {
                panelContainer.style.display = 'none';
                manageScrollReveals();
            }, 2500);
        });

        // --- LOGIC DRIVE: SCROLL TRANSITIONS ---
        const sections = document.querySelectorAll('.scroll-section');
        function manageScrollReveals() {
            sections.forEach(sec => {
                const secTop = sec.getBoundingClientRect().top;
                if (secTop < window.innerHeight * 0.88) {
                    sec.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', manageScrollReveals);

        // --- LOGIC DRIVE: ULTRA REALISTIC SMOOTH PURPLE CANVAS SCRATCH CARD ---
        const cvs = document.getElementById('scratch-canvas');
        const renderCtx = cvs.getContext('2d');
        const hostBox = document.getElementById('canvas-host');
        let totalScratchedArea = 0;
        let scratchTriggered = false;
        let isDrawing = false;

        function buildPurpleMetallicScratchLayer() {
            cvs.width = hostBox.offsetWidth;
            cvs.height = hostBox.offsetHeight;

            // Royal Deep Velvet Purple Shimmer Matte Matrix
            let gd = renderCtx.createLinearGradient(0, 0, cvs.width, cvs.height);
            gd.addColorStop(0, '#1c0433');
            gd.addColorStop(0.3, '#4a127a');
            gd.addColorStop(0.6, '#5e179c');
            gd.addColorStop(1, '#0f021f');
            
            renderCtx.fillStyle = gd;
            renderCtx.fillRect(0, 0, cvs.width, cvs.height);

            // Double Intricate Inner Framing Line
            renderCtx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
            renderCtx.lineWidth = 2;
            renderCtx.strokeRect(14, 14, cvs.width - 28, cvs.height - 28);

            // Text guidelines overlay
            renderCtx.font = "bold 17px 'Cinzel', serif";
            renderCtx.fillStyle = "#d4af37";
            renderCtx.textAlign = "center";
            // Shadow mapping for text visibility
            renderCtx.shadowColor = "rgba(0, 0, 0, 0.7)";
            renderCtx.shadowBlur = 4;
            renderCtx.fillText("Scratch to Open Date", cvs.width / 2, cvs.height / 2 + 6);
            
            // Reset shadows for clean transparency clipping
            renderCtx.shadowBlur = 0;
        }

        window.addEventListener('resize', buildPurpleMetallicScratchLayer);
        setTimeout(buildPurpleMetallicScratchLayer, 400);

        function scratchExecution(e) {
            if (scratchTriggered) return;
            
            const rect = cvs.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const currentX = clientX - rect.left;
            const currentY = clientY - rect.top;

            // Perform structural translucent alpha clearing operation
            renderCtx.globalCompositeOperation = 'destination-out';
            renderCtx.beginPath();
            renderCtx.arc(currentX, currentY, 32, 0, Math.PI * 2); /* Increased diameter for velvety smooth scratching */
            renderCtx.fill();

            totalScratchedArea++;
            
            // Validated Threshold: Full vanish and explosion triggers on genuine physical interactive scratching
            if (totalScratchedArea > 45) {
                initiateGrandPyroFinale();
            }
        }

        function initiateGrandPyroFinale() {
            if (scratchTriggered) return;
            scratchTriggered = true;

            cvs.style.opacity = '0';
            
            // Multi-Cluster 5-Second Loop Interval
            const fireworksEngineInterval = setInterval(() => {
                triggerClusterExplosion();
            }, 350);

            setTimeout(() => {
                clearInterval(fireworksEngineInterval);
                cvs.remove();
            }, 5000);
        }

        // Desktop Pointer Wireframes
        cvs.addEventListener('mousedown', (e) => { isDrawing = true; scratchExecution(e); });
        cvs.addEventListener('mousemove', (e) => { if(isDrawing) scratchExecution(e); });
        window.addEventListener('mouseup', () => isDrawing = false);

        // Mobile Responsive Touch Wireframes
        cvs.addEventListener('touchstart', (e) => { isDrawing = true; scratchExecution(e); });
        cvs.addEventListener('touchmove', (e) => { if(isDrawing) scratchExecution(e); });
        window.addEventListener('touchend', () => isDrawing = false);

        // --- PYROTECHNIC MATRIX ENGINE (FIREWORKS) ---
        function triggerClusterExplosion() {
            const richColors = ['#d4af37', '#fbeba7', '#ffffff', '#9b5de5', '#f15bb5', '#00f5d4'];
            const singleBurstVolume = 45; 

            const pivotX = 30 + Math.random() * (hostBox.offsetWidth - 60);
            const pivotY = 30 + Math.random() * (hostBox.offsetHeight - 60);

            for (let i = 0; i < singleBurstVolume; i++) {
                const particle = document.createElement('div');
                particle.className = 'fw-particle';
                
                const angle = Math.random() * Math.PI * 2;
                const force = 40 + Math.random() * 160;
                
                const moveX = Math.cos(angle) * force;
                const moveY = Math.sin(angle) * force;

                particle.style.setProperty('--mx', `${moveX}px`);
                particle.style.setProperty('--my', `${moveY}px`);
                
                particle.style.left = `${pivotX}px`;
                particle.style.top = `${pivotY}px`;
                particle.style.backgroundColor = richColors[Math.floor(Math.random() * richColors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.backgroundColor}`;

                hostBox.appendChild(particle);
                setTimeout(() => particle.remove(), 1350);
            }
        }

        // --- EVENT CHRONOMETER COUNTER ---
        const TargetTimelineEpoch = new Date("June 13, 2026 17:30:00").getTime();

        setInterval(() => {
            const currentEpoch = new Date().getTime();
            const gapDelta = TargetTimelineEpoch - currentEpoch;

            if (gapDelta < 0) return;

            const days = Math.floor(gapDelta / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gapDelta % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((gapDelta % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((gapDelta % (1000 * 60)) / 1000);

            document.getElementById('lbl-days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('lbl-hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('lbl-mins').innerText = mins < 10 ? '0' + mins : mins;
            document.getElementById('lbl-secs').innerText = secs < 10 ? '0' + secs : secs;
        }, 1000);
    </script>
</body>
</html>
